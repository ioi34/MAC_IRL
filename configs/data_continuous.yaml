paths:
  raw_daily: samsung_macirl_EXTENDED_2019_2025.csv
  processed_dataset: data/processed/dataset_continuous.npz
  processed_metadata: data/processed/metadata_continuous.json

columns:
  date: date
  ticker: ticker
  price: adjusted_close
  fallback_price: close
  trading_value: trading_value
  usdkrw: usdkrw
  kospi200_return: kospi200_return
  investor_trades:
    foreign:
      buy_quantity: foreign_buy_volume
      sell_quantity: foreign_sell_volume
      buy_value: foreign_buy_value
      sell_value: foreign_sell_value
    institution:
      buy_quantity: institution_buy_volume
      sell_quantity: institution_sell_volume
      buy_value: institution_buy_value
      sell_value: institution_sell_value
    retail:
      buy_quantity: retail_buy_volume
      sell_quantity: retail_sell_volume
      buy_value: retail_buy_value
      sell_value: retail_sell_value

investors: [foreign, institution, retail]

labeling:
  label_shift: 1

sample:
  start: "2020-01-01"
  end: "2025-12-31"
  size: 973
  selection: latest

preprocess:
  ticker: null
  drop_missing_required: true
  average_cost_rho: 0.98
